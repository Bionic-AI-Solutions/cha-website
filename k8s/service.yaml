---
apiVersion: v1
kind: Service
metadata:
  name: cha-website
  namespace: cha-website
  labels:
    app.kubernetes.io/name: cha-website
    app.kubernetes.io/instance: cha-website
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: cha
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cha-website
    app.kubernetes.io/instance: cha-website
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
