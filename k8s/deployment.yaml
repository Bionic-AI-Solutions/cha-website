---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: srenix-website
  namespace: srenix-website
  labels:
    app.kubernetes.io/name: srenix-website
    app.kubernetes.io/instance: srenix-website
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: srenix
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: srenix-website
      app.kubernetes.io/instance: srenix-website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: srenix-website
        app.kubernetes.io/instance: srenix-website
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: srenix
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: srenix-website
          image: docker4zerocool/srenix-website:v0.4.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
      imagePullSecrets:
        - name: dockerhub-pull-secret
