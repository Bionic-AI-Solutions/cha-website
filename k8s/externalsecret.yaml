---
# Pulls Docker Hub pull credentials from Vault (shared/dockerhub) and
# materializes a dockerconfigjson Secret that the Deployment references
# via imagePullSecrets. Mirrors the pattern used across the cluster
# (agentic-sre, guruji, bionic-platform, etc.).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-pull-secret
  namespace: srenix-website
  labels:
    app.kubernetes.io/name: srenix-website
    app.kubernetes.io/instance: srenix-website
    app.kubernetes.io/component: image-pull
    app.kubernetes.io/part-of: srenix
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: dockerhub-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      mergePolicy: Replace
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .pat }}","email":"{{ .email }}","auth":"{{ printf "%s:%s" .username .pat | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: shared/dockerhub
        property: username
    - secretKey: pat
      remoteRef:
        key: shared/dockerhub
        property: pat
    - secretKey: email
      remoteRef:
        key: shared/dockerhub
        property: email
