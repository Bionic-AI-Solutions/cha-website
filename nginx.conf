server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/wasm
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Health endpoint (kubelet + readiness)
    location = /healthz {
        access_log off;
        add_header Cache-Control "no-store";
        default_type text/plain;
        return 200 "ok\n";
    }

    # Hashed static assets — long cache
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other immutable-ish assets in /public (fonts, images)
    location ~* \.(?:woff2?|ttf|otf|eot|png|jpe?g|gif|webp|avif|svg|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # robots.txt + sitemap — short cache, freshness wins
    location = /robots.txt {
        access_log off;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # HTML pages: never cache the shell (cheap to revalidate)
    location / {
        add_header Cache-Control "no-cache";
        # Astro builds with directory format → /pricing/ resolves to /pricing/index.html
        # If nothing matches we return 404, and `error_page` serves /404.html with
        # the correct HTTP status.
        try_files $uri $uri/ $uri.html =404;
    }

    # Astro's 404 page — served with a real 404 status
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-store";
    }

    # Disable server tokens
    server_tokens off;

    # A few sensible security headers (the site has no user input, so these are mild)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
